<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>Task Management Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }

[data-theme="dark"] { --bg1: #0d0d2b; --bg2: #1a1a4e; --card-bg: rgba(255,255,255,0.05); --card-border: rgba(255,255,255,0.1); --text: #ffffff; --text-secondary: #a0aec0; --input-bg: rgba(255,255,255,0.08); --input-border: rgba(255,255,255,0.15); --table-border: rgba(255,255,255,0.08); --topbar-bg: rgba(0,0,0,0.4); }
[data-theme="light"] { --bg1: #3a4b8f; --bg2: #6f86d6; --card-bg: rgba(255,255,255,0.9); --card-border: rgba(255,255,255,0.5); --text: #1f2933; --text-secondary: #4b5563; --input-bg: #f9fafb; --input-border: #d1d5db; --table-border: #e5e7eb; --topbar-bg: #2b3a67; }
[data-theme="purple"] { --bg1: #1a0533; --bg2: #4a1080; --card-bg: rgba(255,255,255,0.07); --card-border: rgba(255,255,255,0.15); --text: #ffffff; --text-secondary: #d8b4fe; --input-bg: rgba(255,255,255,0.1); --input-border: rgba(216,180,254,0.3); --table-border: rgba(216,180,254,0.2); --topbar-bg: rgba(26,5,51,0.8); }
[data-theme="ocean"] { --bg1: #001f3f; --bg2: #0074cc; --card-bg: rgba(255,255,255,0.07); --card-border: rgba(255,255,255,0.15); --text: #ffffff; --text-secondary: #93c5fd; --input-bg: rgba(255,255,255,0.1); --input-border: rgba(147,197,253,0.3); --table-border: rgba(147,197,253,0.2); --topbar-bg: rgba(0,31,63,0.8); }

body { background: linear-gradient(135deg, var(--bg1), var(--bg2)); color: var(--text); min-height: 100vh; transition: background 0.5s, color 0.3s; overflow-x: hidden; }

/* ── Stars ── */
.stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
.star { position: absolute; border-radius: 50%; opacity: 0; animation: twinkle linear infinite; }
@keyframes twinkle { 0% { opacity: 0; transform: translateY(0) scale(1); } 50% { opacity: 1; transform: translateY(-20px) scale(1.2); } 100% { opacity: 0; transform: translateY(-40px) scale(0.8); } }

/* ── Meteors ── */
.meteor { position: fixed; top: -10px; width: 2px; border-radius: 50%; background: linear-gradient(180deg, white, transparent); animation: meteorFall linear infinite; pointer-events: none; z-index: 0; opacity: 0; }
@keyframes meteorFall {
  0% { opacity: 0; transform: translateY(-100px) translateX(0) rotate(35deg); }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { opacity: 0; transform: translateY(110vh) translateX(-200px) rotate(35deg); }
}

/* ── Nebula blobs ── */
.nebula { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: nebulaPulse ease-in-out infinite; }
@keyframes nebulaPulse { 0%, 100% { opacity: 0.15; transform: scale(1); } 50% { opacity: 0.25; transform: scale(1.1); } }

/* ── Topbar ── */
.topbar { position: relative; z-index: 1; background: var(--topbar-bg); backdrop-filter: blur(10px); color: #fff; padding: 14px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); box-shadow: 0 2px 20px rgba(0,0,0,0.3); }
.topbar h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
.topbar-right { display: flex; align-items: center; gap: 10px; font-size: 14px; flex-wrap: wrap; }

.theme-bar { display: flex; gap: 6px; }
.theme-btn { padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3); cursor: pointer; font-size: 11px; color: white; backdrop-filter: blur(10px); transition: all 0.3s; font-weight: 600; }
.theme-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,255,255,0.2); }
.theme-btn.dark { background: rgba(13,13,43,0.8); }
.theme-btn.light { background: rgba(58,75,143,0.8); }
.theme-btn.purple { background: rgba(74,16,128,0.8); }
.theme-btn.ocean { background: rgba(0,116,204,0.8); }
.theme-btn.active { border: 2px solid white; box-shadow: 0 0 10px rgba(255,255,255,0.3); }

.logout-btn { color: #fff; background: rgba(255,255,255,0.15); padding: 6px 14px; border-radius: 6px; text-decoration: none; font-size: 13px; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.2); }
.logout-btn:hover { background: rgba(255,255,255,0.25); box-shadow: 0 0 10px rgba(255,255,255,0.2); }

/* ── Container ── */
.container { position: relative; z-index: 1; max-width: 1100px; margin: 24px auto; padding: 0 20px; display: grid; gap: 20px; }

.form-card, .table-card { background: var(--card-bg); backdrop-filter: blur(16px); border-radius: 16px; padding: 24px 28px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid var(--card-border); }

@keyframes fadeSlideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.animate-in { animation: fadeSlideIn 0.5s ease forwards; }

.form-card h2, .table-card h2 { font-size: 16px; margin-bottom: 16px; color: var(--text); font-weight: 600; }

/* ── Form ── */
.form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
.form-group { display: flex; flex-direction: column; flex: 1; min-width: 130px; }
.form-group label { font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; font-weight: 500; }
.form-group input, .form-group select { padding: 9px 10px; border: 1px solid var(--input-border); border-radius: 8px; font-size: 13px; background: var(--input-bg); color: var(--text); transition: all 0.2s; outline: none; }
.form-group input:focus, .form-group select:focus { border-color: #6f86d6; box-shadow: 0 0 0 3px rgba(111,134,214,0.15); }
.form-group select option { background: #1a1a4e; color: white; }
[data-theme="light"] .form-group select option { background: white; color: #1f2933; }

/* ── Glowing Submit button ── */
.submit-group { min-width: 110px; flex: 0; }
.submit-group button {
  padding: 10px 20px;
  background: linear-gradient(135deg, #16a34a, #22c55e);
  color: #fff; border: none; border-radius: 8px;
  cursor: pointer; font-size: 14px; font-weight: 600;
  transition: all 0.3s; width: 100%; white-space: nowrap;
  box-shadow: 0 0 15px rgba(34,197,94,0.4);
  animation: glowPulse 2s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { box-shadow: 0 0 15px rgba(34,197,94,0.4); }
  50% { box-shadow: 0 0 25px rgba(34,197,94,0.7), 0 0 40px rgba(34,197,94,0.3); }
}
.submit-group button:hover { transform: translateY(-3px); box-shadow: 0 0 30px rgba(34,197,94,0.8); }
.submit-group button:active { transform: translateY(0); }

#form-message { font-size: 13px; margin-top: 10px; }
#form-message.success { color: #22c55e; }
#form-message.error { color: #f87171; }

/* ── Toast ── */
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: linear-gradient(135deg, #16a34a, #22c55e); color: white; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; z-index: 9999; transition: transform 0.4s ease; box-shadow: 0 6px 20px rgba(34,197,94,0.4); }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: linear-gradient(135deg, #dc2626, #ef4444); box-shadow: 0 6px 20px rgba(239,68,68,0.4); }

/* ── Modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9998; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
.modal-box { background: linear-gradient(135deg, #1a1a4e, #0d0d2b); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 32px; width: 380px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(239,68,68,0.1); animation: fadeSlideIn 0.3s ease; }
[data-theme="light"] .modal-box { background: #ffffff; border-color: #e2e8f0; }
.modal-box h3 { font-size: 20px; color: var(--text); margin-bottom: 10px; }
.modal-box p { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6; }
.modal-btns { display: flex; gap: 12px; justify-content: center; }
.modal-cancel { padding: 10px 24px; border-radius: 8px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text); cursor: pointer; font-size: 14px; transition: all 0.2s; }
.modal-cancel:hover { background: rgba(111,134,214,0.2); border-color: #6f86d6; }
.modal-confirm { padding: 10px 24px; border-radius: 8px; border: none; background: linear-gradient(135deg, #dc2626, #ef4444); color: white; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; box-shadow: 0 0 15px rgba(239,68,68,0.4); }
.modal-confirm:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(239,68,68,0.7); }

/* ── Counters ── */
.counters { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.counter-badge { padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; transition: transform 0.2s; cursor: default; }
.counter-badge:hover { transform: translateY(-2px); }
.counter-badge.total { background: rgba(111,134,214,0.2); color: #a5b4fc; border: 1px solid rgba(111,134,214,0.3); box-shadow: 0 0 10px rgba(111,134,214,0.2); }
.counter-badge.done { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); box-shadow: 0 0 10px rgba(34,197,94,0.2); }
.counter-badge.pending { background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid rgba(248,113,113,0.3); box-shadow: 0 0 10px rgba(248,113,113,0.2); }
[data-theme="light"] .counter-badge.total { background: rgba(58,75,143,0.1); color: #3a4b8f; border-color: rgba(58,75,143,0.2); }
[data-theme="light"] .counter-badge.done { background: rgba(34,197,94,0.1); color: #16a34a; border-color: rgba(34,197,94,0.2); }
[data-theme="light"] .counter-badge.pending { background: rgba(248,113,113,0.1); color: #dc2626; border-color: rgba(248,113,113,0.2); }

/* ── Search ── */
.search-bar { margin-bottom: 16px; }
.search-bar input { width: 100%; padding: 10px 14px; border: 1px solid var(--input-border); border-radius: 8px; font-size: 14px; background: var(--input-bg); color: var(--text); outline: none; transition: all 0.2s; }
.search-bar input:focus { border-color: #6f86d6; box-shadow: 0 0 0 3px rgba(111,134,214,0.15); }

/* ── Table ── */
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th, td { padding: 12px 14px; border-bottom: 1px solid var(--table-border); text-align: left; color: var(--text); }
th { color: var(--text-secondary); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
tr:hover td { background: rgba(255,255,255,0.03); }

.status-badge { padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; }
.status-badge.completed { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); box-shadow: 0 0 8px rgba(34,197,94,0.2); }
.status-badge.pending { background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid rgba(248,113,113,0.3); box-shadow: 0 0 8px rgba(248,113,113,0.2); }

/* ── Glowing toggle and delete buttons ── */
.toggle-btn { padding: 6px 12px; font-size: 12px; border-radius: 6px; border: 1px solid rgba(111,134,214,0.4); background: rgba(111,134,214,0.1); color: #a5b4fc; cursor: pointer; transition: all 0.2s; font-weight: 500; }
.toggle-btn:hover { background: rgba(111,134,214,0.25); border-color: #6f86d6; box-shadow: 0 0 12px rgba(111,134,214,0.4); transform: translateY(-1px); }

.delete-btn { padding: 6px 12px; font-size: 12px; border-radius: 6px; border: 1px solid rgba(248,113,113,0.4); background: rgba(248,113,113,0.1); color: #f87171; cursor: pointer; transition: all 0.2s; font-weight: 500; }
.delete-btn:hover { background: rgba(248,113,113,0.2); border-color: #f87171; box-shadow: 0 0 12px rgba(248,113,113,0.4); transform: translateY(-1px); }

@media (max-width: 700px) { .form-row { flex-direction: column; } .theme-bar { display: none; } }
</style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <header class="topbar">
    <h1>⚡ Task Management</h1>
    <div class="topbar-right">
      <div class="theme-bar">
        <button class="theme-btn dark active" onclick="setTheme('dark', this)">🌑 Dark</button>
        <button class="theme-btn light" onclick="setTheme('light', this)">☀️ Light</button>
        <button class="theme-btn purple" onclick="setTheme('purple', this)">💜 Purple</button>
        <button class="theme-btn ocean" onclick="setTheme('ocean', this)">🌊 Ocean</button>
      </div>
      <span>Welcome, {{ username }} (Manager)</span>
      <a class="logout-btn" href="{{ url_for('logout') }}">Logout</a>
    </div>
  </header>

  <main class="container">
    <section class="form-card animate-in">
      <h2>✨ Assign / Update Task</h2>
      <form id="task-form">
        <div class="form-row">
          <div class="form-group">
            <label for="emp_id">Employee ID</label>
            <input type="text" id="emp_id" name="emp_id" placeholder="e.g. E101" required>
          </div>
          <div class="form-group">
            <label for="employee_name">Employee Name</label>
            <input type="text" id="employee_name" name="employee_name" placeholder="e.g. Ravi Kumar" required>
          </div>
          <div class="form-group">
            <label for="task_title">Task Title</label>
            <select id="task_title" name="task_title" required>
              <option value="" disabled selected>Select task</option>
              <option value="Group Discussion">Group Discussion</option>
              <option value="Meeting">Meeting</option>
              <option value="Report Submission">Report Submission</option>
            </select>
          </div>
          <div class="form-group">
            <label for="completed">Completed</label>
            <select id="completed" name="completed" required>
              <option value="" disabled selected>Select status</option>
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </div>
          <div class="form-group submit-group">
            <label>&nbsp;</label>
            <button type="submit" id="submit-btn">🚀 Submit</button>
          </div>
        </div>
        <span id="form-message"></span>
      </form>
    </section>

    <section class="table-card animate-in">
      <h2>📋 All Tasks</h2>
      <div id="counters" class="counters"></div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="🔍 Search by employee name, ID or task...">
      </div>
      <table id="tasks-table">
        <thead>
          <tr>
            <th>Task ID</th>
            <th>Emp ID</th>
            <th>Employee Name</th>
            <th>Task Title</th>
            <th>Status</th>
            <th>Toggle</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tasks-tbody"></tbody>
      </table>
    </section>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <script>
    const starsContainer = document.getElementById('stars');
    const starColors = { dark: 'white', light: '#2b3a67', purple: '#e9d5ff', ocean: '#bae6fd' };
    const meteorColors = { dark: 'white', light: '#3a4b8f', purple: '#d8b4fe', ocean: '#93c5fd' };
    let currentTheme = 'dark';

    function createStars(color) {
      const existing = starsContainer.querySelectorAll('.star');
      existing.forEach(s => s.remove());
      for (let i = 0; i < 120; i++) {
        const star = document.createElement('div');
        star.classList.add('star');
        star.style.left = Math.random() * 100 + 'vw';
        star.style.top = Math.random() * 100 + 'vh';
        const size = Math.random() * 3 + 1 + 'px';
        star.style.width = size;
        star.style.height = size;
        star.style.background = color;
        star.style.animationDuration = Math.random() * 3 + 2 + 's';
        star.style.animationDelay = Math.random() * 5 + 's';
        starsContainer.appendChild(star);
      }
    }

    function createMeteors(color) {
      const existing = starsContainer.querySelectorAll('.meteor');
      existing.forEach(m => m.remove());
      for (let i = 0; i < 8; i++) {
        const meteor = document.createElement('div');
        meteor.classList.add('meteor');
        meteor.style.left = Math.random() * 100 + 'vw';
        meteor.style.height = Math.random() * 80 + 40 + 'px';
        meteor.style.background = `linear-gradient(180deg, ${color}, transparent)`;
        meteor.style.animationDuration = Math.random() * 3 + 2 + 's';
        meteor.style.animationDelay = Math.random() * 8 + 's';
        starsContainer.appendChild(meteor);
      }
    }

    function createNebulas() {
      const existing = starsContainer.querySelectorAll('.nebula');
      existing.forEach(n => n.remove());
      const colors = ['rgba(111,134,214,0.3)', 'rgba(139,92,246,0.3)', 'rgba(34,197,94,0.2)', 'rgba(6,182,212,0.2)'];
      for (let i = 0; i < 4; i++) {
        const nebula = document.createElement('div');
        nebula.classList.add('nebula');
        nebula.style.width = Math.random() * 300 + 200 + 'px';
        nebula.style.height = nebula.style.width;
        nebula.style.left = Math.random() * 100 + 'vw';
        nebula.style.top = Math.random() * 100 + 'vh';
        nebula.style.background = colors[i % colors.length];
        nebula.style.animationDuration = Math.random() * 4 + 4 + 's';
        nebula.style.animationDelay = Math.random() * 3 + 's';
        starsContainer.appendChild(nebula);
      }
    }

    function setTheme(theme, btn) {
      currentTheme = theme;
      document.documentElement.setAttribute('data-theme', theme);
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      createStars(starColors[theme]);
      createMeteors(meteorColors[theme]);
    }

    createStars('white');
    createMeteors('white');
    createNebulas();
  </script>
</body>
</html>
