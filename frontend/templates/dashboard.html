<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>Task Management Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <!-- Stars background -->
  <div class="stars" id="stars"></div>

  <header class="topbar">
    <h1>Task Management</h1>
    <div class="topbar-right">
      <span>Welcome, {{ username }} (Manager)</span>
      <button class="theme-toggle-small" onclick="toggleTheme()" id="themeBtn">🌙</button>
      <a class="logout-btn" href="{{ url_for('logout') }}">Logout</a>
    </div>
  </header>

  <main class="container">
    <section class="form-card animate-in">
      <h2>Assign / Update Task</h2>
      <form id="task-form">
        <label for="emp_id">Employee ID</label>
        <input type="text" id="emp_id" name="emp_id" placeholder="e.g. E101" required>

        <label for="employee_name">Employee Name</label>
        <input type="text" id="employee_name" name="employee_name" placeholder="e.g. Ravi Kumar" required>

        <label for="task_title">Task Title</label>
        <select id="task_title" name="task_title" required>
          <option value="" disabled selected>Select task</option>
          <option value="Group Discussion">Group Discussion</option>
          <option value="Meeting">Meeting</option>
          <option value="Report Submission">Report Submission</option>
        </select>

        <label for="completed">Completed</label>
        <select id="completed" name="completed" required>
          <option value="" disabled selected>Select status</option>
          <option value="true">true</option>
          <option value="false">false</option>
        </select>

        <button type="submit" id="submit-btn">Submit</button>
        <span id="form-message"></span>
      </form>
    </section>

    <section class="table-card animate-in">
      <h2>All Tasks</h2>
      <table id="tasks-table">
        <thead>
          <tr>
            <th>Task ID</th>
            <th>Emp ID</th>
            <th>Employee Name</th>
            <th>Task Title</th>
            <th>Status</th>
            <th>Toggle</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tasks-tbody">
        </tbody>
      </table>
    </section>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <script>
    // Generate stars
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.classList.add('star');
      star.style.left = Math.random() * 100 + 'vw';
      star.style.top = Math.random() * 100 + 'vh';
      star.style.width = Math.random() * 3 + 1 + 'px';
      star.style.height = star.style.width;
      star.style.animationDuration = Math.random() * 3 + 2 + 's';
      star.style.animationDelay = Math.random() * 5 + 's';
      starsContainer.appendChild(star);
    }

    // Theme toggle
    function toggleTheme() {
      const html = document.documentElement;
      const btn = document.getElementById('themeBtn');
      if (html.getAttribute('data-theme') === 'dark') {
        html.setAttribute('data-theme', 'light');
        btn.textContent = '☀️';
      } else {
        html.setAttribute('data-theme', 'dark');
        btn.textContent = '🌙';
      }
    }
  </script>
</body>
</html>
